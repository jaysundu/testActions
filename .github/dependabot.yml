# Generated for the Dependabot digest-refresh test.
version: 2

registries:
  ghcr:
    type: docker-registry
    url: https://ghcr.io
    username: jaysundu
    password: ${{secrets.GHCR_TOKEN}}
    replaces-base: true
  dhi:
    type: docker-registry
    url: https://dhi.io
    username: ${{secrets.DHI_USERNAME}}
    password: ${{secrets.DHI_TOKEN}}
    replaces-base: true

updates:
  - package-ecosystem: docker
    directory: /digest-refresh-test/consumer
    registries:
      - ghcr
    schedule:
      interval: daily
  - package-ecosystem: docker
    directory: /digest-refresh-test/dhi-consumer
    registries:
      - dhi
    ignore:
      - dependency-name: nginx
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
          - version-update:semver-patch
    schedule:
      interval: daily
